<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FalkorDB Canvas Web Component Example</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      color: #333;
      margin-bottom: 20px;
    }

    .graph-container {
      height: 600px;
      width: 100%;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .controls {
      margin-bottom: 20px;
      padding: 15px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .config-panels {
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    details {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    summary {
      padding: 12px 15px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      color: #333;
      user-select: none;
      background: #fafafa;
      border-bottom: 1px solid #eee;
    }

    summary:hover {
      background: #f0f0f0;
    }

    .panel-content {
      padding: 15px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .config-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .config-field label {
      font-size: 11px;
      color: #666;
      font-weight: 500;
    }

    .config-field input,
    .config-field select {
      padding: 4px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }

    .config-field input[type="number"] {
      width: 70px;
    }

    .config-field input[type="color"] {
      width: 40px;
      height: 28px;
      padding: 2px;
    }

    .config-field input[type="text"] {
      width: 120px;
    }

    button {
      margin-right: 10px;
      padding: 8px 16px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    button:hover {
      background: #45a049;
    }

    button.secondary {
      background: #2196F3;
    }

    button.secondary:hover {
      background: #1976D2;
    }

    .info {
      margin-top: 20px;
      padding: 15px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    #selected-info {
      color: #666;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>FalkorDB Canvas Web Component</h1>

    <!-- Query & Actions -->
    <div class="controls">
      <div style="display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap;">
        <div style="display: flex; flex-direction: column; gap: 4px;">
          <label for="api-key" style="font-size: 12px; color: #666;">OpenAI API Key</label>
          <input id="api-key" type="password" placeholder="sk-..." style="padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 200px;">
        </div>
        <div style="display: flex; flex-direction: column; gap: 4px;">
          <label for="domain-input" style="font-size: 12px; color: #666;">Domain</label>
          <input id="domain-input" type="text" placeholder="https://browser.falkordb.com" style="padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 250px;">
        </div>
        <div style="display: flex; flex-direction: column; gap: 4px;">
          <label for="graph-name" style="font-size: 12px; color: #666;">Graph Name</label>
          <input id="graph-name" type="text" placeholder="e.g. movies" style="padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 150px;">
        </div>
        <div style="display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 150px;">
          <label for="query-input" style="font-size: 12px; color: #666;">Query</label>
          <input id="query-input" type="text" placeholder="MATCH (n)-[e]->(m) RETURN n, e, m LIMIT 25" style="padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
        </div>
        <button onclick="sendQuery()">Send</button>
      </div>
      <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
        <button onclick="addNode()">Add Node</button>
        <button onclick="addLink()">Add Link</button>
        <button onclick="generateLargeGraph()">Generate 100 Nodes</button>
        <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 14px; color: #333;">
          <input type="checkbox" id="animation-toggle" onchange="toggleAnimation()">
          Animation
        </label>
        <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 14px; color: #333;">
          <input type="checkbox" id="pin-toggle" onchange="togglePin()">
          Pin
        </label>
        <label style="display: flex; align-items: center; gap: 6px; font-size: 14px; color: #333;">
          Layout:
          <select id="layout-select" onchange="changeLayout(this.value)" style="padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px;">
            <option value="force">Force</option>
            <option value="tree">Tree</option>
            <option value="flow">Flow</option>
            <option value="radial">Radial</option>
          </select>
        </label>
        <label style="display: flex; align-items: center; gap: 6px; font-size: 14px; color: #333;">
          Direction:
          <select id="direction-select" onchange="changeDirection(this.value)" style="padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px;">
            <option value="td">Top-Down</option>
            <option value="bu">Bottom-Up</option>
          </select>
        </label>
        <label style="display: flex; align-items: center; gap: 6px; font-size: 14px; color: #333;">
          Level Dist:
          <input id="level-distance" type="number" value="80" min="30" max="500" step="10" oninput="changeSpacing()" style="width: 60px; padding: 4px; border: 1px solid #ccc; border-radius: 4px;">
        </label>
        <label style="display: flex; align-items: center; gap: 6px; font-size: 14px; color: #333;">
          Node Spacing:
          <input id="node-spacing" type="number" value="60" min="20" max="300" step="10" oninput="changeSpacing()" style="width: 60px; padding: 4px; border: 1px solid #ccc; border-radius: 4px;">
        </label>
        <label style="display: flex; align-items: center; gap: 6px; font-size: 14px; color: #333;">
          Edge Gap:
          <input id="edge-gap" type="number" value="2" min="0" max="15" step="1" oninput="changeEdgeGap()" style="width: 60px; padding: 4px; border: 1px solid #ccc; border-radius: 4px;">
        </label>
      </div>
    </div>

    <!-- Config Sub-Panels -->
    <div class="config-panels">

      <!-- Node Style -->
      <details>
        <summary>Node Style</summary>
        <div class="panel-content">
          <div class="config-field">
            <label>Font Family</label>
            <input type="text" id="ns-fontFamily" value="SofiaSans">
          </div>
          <div class="config-field">
            <label>Font Weight (Unselected)</label>
            <input type="number" id="ns-fontWeightUnselected" value="400" min="100" max="900" step="100">
          </div>
          <div class="config-field">
            <label>Font Weight (Selected)</label>
            <input type="number" id="ns-fontWeightSelected" value="700" min="100" max="900" step="100">
          </div>
          <div class="config-field">
            <label>Font Size</label>
            <input type="number" id="ns-fontSize" value="2" min="0.5" max="8" step="0.5">
          </div>
          <div class="config-field">
            <label>Text Fill Ratio</label>
            <input type="number" id="ns-textFillRatio" value="0.85" min="0.1" max="1" step="0.05">
          </div>
          <div class="config-field">
            <label>Stroke (Selected)</label>
            <input type="number" id="ns-strokeWidthSelected" value="1" min="0" max="5" step="0.5">
          </div>
          <div class="config-field">
            <label>Stroke (Unselected)</label>
            <input type="number" id="ns-strokeWidthUnselected" value="0.5" min="0" max="5" step="0.25">
          </div>
          <div class="config-field">
            <label>Glow Duration (ms)</label>
            <input type="number" id="ns-glowDuration" value="10000" min="0" max="30000" step="1000">
          </div>
          <div class="config-field">
            <label>Glow Spread</label>
            <input type="number" id="ns-glowSpread" value="12" min="0" max="40" step="2">
          </div>
          <div class="config-field">
            <label>Glow Steps</label>
            <input type="number" id="ns-glowSteps" value="16" min="1" max="32" step="1">
          </div>
          <div class="config-field">
            <label>Glow Color</label>
            <input type="color" id="ns-glowColor" value="#3b82f6">
          </div>
          <div class="config-field">
            <label>Glow Max Opacity</label>
            <input type="number" id="ns-glowMaxOpacity" value="0.6" min="0" max="1" step="0.1">
          </div>
          <button class="secondary" onclick="applyNodeStyle()">Apply</button>
        </div>
      </details>

      <!-- Link Style -->
      <details>
        <summary>Link Style</summary>
        <div class="panel-content">
          <div class="config-field">
            <label>Font Family</label>
            <input type="text" id="ls-fontFamily" value="SofiaSans">
          </div>
          <div class="config-field">
            <label>Font Size</label>
            <input type="number" id="ls-fontSize" value="2" min="0.5" max="8" step="0.5">
          </div>
          <div class="config-field">
            <label>Weight (Unselected)</label>
            <input type="number" id="ls-fontWeightUnselected" value="400" min="100" max="900" step="100">
          </div>
          <div class="config-field">
            <label>Weight (Selected)</label>
            <input type="number" id="ls-fontWeightSelected" value="700" min="100" max="900" step="100">
          </div>
          <div class="config-field">
            <label>Line Width (Selected)</label>
            <input type="number" id="ls-lineWidthSelected" value="2" min="0.5" max="10" step="0.5">
          </div>
          <div class="config-field">
            <label>Line Width (Unselected)</label>
            <input type="number" id="ls-lineWidthUnselected" value="1" min="0.25" max="10" step="0.25">
          </div>
          <div class="config-field">
            <label>Arrow Len (Selected)</label>
            <input type="number" id="ls-arrowLengthSelected" value="16" min="0" max="40" step="2">
          </div>
          <div class="config-field">
            <label>Arrow Len (Unselected)</label>
            <input type="number" id="ls-arrowLengthUnselected" value="8" min="0" max="40" step="2">
          </div>
          <div class="config-field">
            <label>Arrow Width Ratio</label>
            <input type="number" id="ls-arrowWidthRatio" value="1.6" min="0.5" max="4" step="0.2">
          </div>
          <div class="config-field">
            <label>Arrow Notch Ratio</label>
            <input type="number" id="ls-arrowNotchRatio" value="0.2" min="0" max="1" step="0.1">
          </div>
          <div class="config-field">
            <label>Self-Loop Curve</label>
            <input type="number" id="ls-selfLoopCurveFactor" value="11.67" min="1" max="30" step="0.5">
          </div>
          <div class="config-field">
            <label>Parallel Edge Curve</label>
            <input type="number" id="ls-parallelEdgeCurveMultiplier" value="0.4" min="0.1" max="2" step="0.1">
          </div>
          <div class="config-field">
            <label>Label BG Padding</label>
            <input type="number" id="ls-labelBackgroundPadding" value="0.3" min="0" max="2" step="0.1">
          </div>
          <button class="secondary" onclick="applyLinkStyle()">Apply</button>
        </div>
      </details>

      <!-- Simulation -->
      <details>
        <summary>Simulation</summary>
        <div class="panel-content">
          <div class="config-field">
            <label>Center Strength</label>
            <input type="number" id="sim-centerStrength" value="0.03" min="0" max="1" step="0.01">
          </div>
          <div class="config-field">
            <label>Charge Strength</label>
            <input type="number" id="sim-chargeStrength" value="-400" min="-2000" max="0" step="50">
          </div>
          <div class="config-field">
            <label>Velocity Decay</label>
            <input type="number" id="sim-velocityDecay" value="0.4" min="0" max="1" step="0.05">
          </div>
          <div class="config-field">
            <label>Alpha Min</label>
            <input type="number" id="sim-alphaMin" value="0.05" min="0.001" max="0.5" step="0.01">
          </div>
          <div class="config-field">
            <label>Warmup Ticks</label>
            <input type="number" id="sim-warmupTicks" value="300" min="0" max="1000" step="50">
          </div>
          <button class="secondary" onclick="applySimulation()">Apply</button>
        </div>
      </details>

      <!-- Interaction -->
      <details>
        <summary>Interaction</summary>
        <div class="panel-content">
          <div class="config-field">
            <label>Tooltip Font Size</label>
            <input type="number" id="int-tooltipFontSize" value="12" min="8" max="24" step="1">
          </div>
          <div class="config-field">
            <label>Tooltip Padding</label>
            <input type="text" id="int-tooltipPadding" value="4px 8px" style="width: 80px;">
          </div>
          <div class="config-field">
            <label>Tooltip Border Radius</label>
            <input type="text" id="int-tooltipBorderRadius" value="4px" style="width: 60px;">
          </div>
          <div class="config-field">
            <label>Tooltip Z-Index</label>
            <input type="number" id="int-tooltipZIndex" value="1000" min="1" max="10000" step="100">
          </div>
          <div class="config-field">
            <label>Zoom-to-Fit Padding</label>
            <input type="number" id="int-zoomToFitPadding" value="0.1" min="0" max="1" step="0.05">
          </div>
          <div class="config-field">
            <label>Zoom-to-Fit Delay (ms)</label>
            <input type="number" id="int-zoomToFitDelay" value="50" min="0" max="500" step="10">
          </div>
          <div class="config-field">
            <label>Link Hit Width</label>
            <input type="number" id="int-linkHitWidth" value="10" min="1" max="30" step="1">
          </div>
          <div class="config-field">
            <label>Contrast Threshold</label>
            <input type="number" id="int-contrastThreshold" value="0.5" min="0" max="1" step="0.05">
          </div>
          <button class="secondary" onclick="applyInteraction()">Apply</button>
        </div>
      </details>

      <!-- Large Graph -->
      <details>
        <summary>Large Graph Optimizations</summary>
        <div class="panel-content">
          <div class="config-field">
            <label>Enabled</label>
            <input type="checkbox" id="lg-enabled">
          </div>
          <div class="config-field">
            <label>Viewport Padding</label>
            <input type="number" id="lg-viewportPadding" value="0" min="0" max="500" step="10">
          </div>
          <div class="config-field">
            <label>Low Zoom Threshold</label>
            <input type="number" id="lg-lowZoomThreshold" value="2" min="1" max="10" step="0.5">
          </div>
          <div class="config-field">
            <label>Skip Labels at Low Zoom</label>
            <input type="checkbox" id="lg-skipLabelsAtLowZoom" checked>
          </div>
          <div class="config-field">
            <label>Skip Arrows at Low Zoom</label>
            <input type="checkbox" id="lg-skipArrowsAtLowZoom" checked>
          </div>
          <div class="config-field">
            <label>Skip Link Labels at Low Zoom</label>
            <input type="checkbox" id="lg-skipLinkLabelsAtLowZoom" checked>
          </div>
          <button class="secondary" onclick="applyLargeGraph()">Apply</button>
          <div id="lg-debug" style="margin-top: 8px; padding: 8px; background: #f0f0f0; border-radius: 4px; font-family: monospace; font-size: 11px; display: none;">
            <div>Zoom: <span id="lg-debug-zoom">-</span> | Culling zoom: <span id="lg-debug-culling-zoom">-</span></div>
            <div>Low-zoom active: <span id="lg-debug-low-zoom">-</span> (threshold: k ≤ <span id="lg-debug-threshold">-</span>)</div>
            <div>Nodes visible: <span id="lg-debug-nodes">-</span> | Links visible: <span id="lg-debug-links">-</span></div>
          </div>
        </div>
      </details>

      <!-- Colors & Display -->
      <details>
        <summary>Colors &amp; Display</summary>
        <div class="panel-content">
          <div class="config-field">
            <label>Background Color</label>
            <input type="color" id="cfg-backgroundColor" value="#ffffff">
          </div>
          <div class="config-field">
            <label>Foreground Color</label>
            <input type="color" id="cfg-foregroundColor" value="#1a1a1a">
          </div>
          <div class="config-field">
            <label>Show Property Key Prefix</label>
            <input type="checkbox" id="cfg-showPropertyKeyPrefix">
          </div>
          <button class="secondary" onclick="applyColors()">Apply</button>
        </div>
      </details>

    </div>

    <div class="graph-container">
      <falkordb-canvas id="graph"></falkordb-canvas>
    </div>

    <div class="info">
      <h3>Selected Element:</h3>
      <div id="selected-info">Click on a node or link to see details</div>
    </div>
  </div>

  <!-- Import map for module resolution -->
  <script type="importmap">
    {
      "imports": {
        "d3": "https://cdn.jsdelivr.net/npm/d3@7.9.0/+esm",
        "force-graph": "https://cdn.jsdelivr.net/npm/force-graph@1.51.0/+esm"
      }
    }
  </script>

  <!-- Import the web component -->
  <script type="module">
    import '../dist/index.js';

    let canvas;

    // Color palettes
    const labelColors = {};
    const relationshipColors = {};
    const colorPalette = [
      '#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#96CEB4',
      '#FFEAA7', '#DFE6E9', '#74B9FF', '#A29BFE', '#FD79A8',
      '#FDCB6E', '#6C5CE7', '#00B894', '#E17055', '#0984E3'
    ];
    let colorIndex = 0;

    const getColorForLabel = (label) => {
      if (!labelColors[label]) {
        labelColors[label] = colorPalette[colorIndex % colorPalette.length];
        colorIndex++;
      }
      return labelColors[label];
    };

    const getColorForRelationship = (type) => {
      if (!relationshipColors[type]) {
        relationshipColors[type] = colorPalette[colorIndex % colorPalette.length];
        colorIndex++;
      }
      return relationshipColors[type];
    };

    // --- Utility: parse hex color to [r, g, b] ---
    const hexToRgb = (hex) => {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return [r, g, b];
    };

    // --- Local Storage ---
    const loadFromStorage = () => {
      const domain = localStorage.getItem('falkordb-canvas-domain');
      const graph = localStorage.getItem('falkordb-canvas-graph');
      const query = localStorage.getItem('falkordb-canvas-query');
      if (domain) document.getElementById('domain-input').value = domain;
      if (graph) document.getElementById('graph-name').value = graph;
      if (query) document.getElementById('query-input').value = query;
    };

    const saveToStorage = () => {
      const domain = document.getElementById('domain-input').value.trim();
      const graph = document.getElementById('graph-name').value.trim();
      const query = document.getElementById('query-input').value.trim();
      localStorage.setItem('falkordb-canvas-domain', domain);
      localStorage.setItem('falkordb-canvas-graph', graph);
      localStorage.setItem('falkordb-canvas-query', query);
    };

    // --- Animation toggle ---
    window.toggleAnimation = () => {
      const enabled = document.getElementById('animation-toggle').checked;
      canvas.setAnimation(enabled);
    };

    // --- Pin toggle ---
    window.togglePin = () => {
      const pinEnabled = document.getElementById('pin-toggle').checked;
      canvas.setPinOnDragEnd(pinEnabled);
    };

    // --- Layout selector ---
    const directionsByLayout = {
      force: [],
      tree: [['td', 'Top-Down'], ['bu', 'Bottom-Up'], ['lr', 'Left-Right'], ['rl', 'Right-Left']],
      flow: [['lr', 'Left-Right'], ['rl', 'Right-Left'], ['td', 'Top-Down'], ['bu', 'Bottom-Up']],
      radial: [['out', 'Outward'], ['in', 'Inward']],
    };

    function updateDirectionOptions(layout) {
      const dirSelect = document.getElementById('direction-select');
      const options = directionsByLayout[layout] || [];
      dirSelect.innerHTML = '';
      for (const [value, label] of options) {
        const opt = document.createElement('option');
        opt.value = value;
        opt.textContent = label;
        dirSelect.appendChild(opt);
      }
      dirSelect.disabled = options.length === 0;

      // Select the stored direction for this layout (if any)
      if (canvas) {
        const layoutOptions = canvas.config?.layoutOptions;
        let storedDir;
        if (layout === 'tree') storedDir = layoutOptions?.tree?.direction;
        else if (layout === 'flow') storedDir = layoutOptions?.flow?.direction;
        else if (layout === 'radial') storedDir = layoutOptions?.radial?.direction;
        if (storedDir && dirSelect.querySelector(`option[value="${storedDir}"]`)) {
          dirSelect.value = storedDir;
        }
      }

      // Level distance applies to tree/flow/radial (not force)
      document.getElementById('level-distance').disabled = layout === 'force';
      // Node spacing applies to tree/flow only
      document.getElementById('node-spacing').disabled = (layout === 'force' || layout === 'radial');
    }

    let currentLayout = 'force';

    window.changeLayout = (layout) => {
      currentLayout = layout;
      updateDirectionOptions(layout);
      canvas.setLayout(layout);
    };

    window.changeDirection = (direction) => {
      const opts = {};
      if (currentLayout === 'tree' || currentLayout === 'flow') {
        opts[currentLayout] = { direction };
      } else if (currentLayout === 'radial') {
        opts.radial = { direction };
      }
      canvas.setLayoutOptions(opts);
    };

    window.changeSpacing = () => {
      const levelInput = document.getElementById('level-distance');
      const spacingInput = document.getElementById('node-spacing');
      let levelDistance = parseInt(levelInput.value);
      let nodeSpacing = parseInt(spacingInput.value);
      if (isNaN(levelDistance)) levelDistance = 80;
      if (isNaN(nodeSpacing)) nodeSpacing = 60;
      // Clamp to min/max
      levelDistance = Math.max(+levelInput.min, Math.min(+levelInput.max, levelDistance));
      nodeSpacing = Math.max(+spacingInput.min, Math.min(+spacingInput.max, nodeSpacing));
      levelInput.value = levelDistance;
      spacingInput.value = nodeSpacing;
      const opts = {};
      if (currentLayout === 'tree' || currentLayout === 'flow') {
        opts[currentLayout] = { levelDistance, nodeSpacing };
      } else if (currentLayout === 'radial') {
        opts.radial = { levelDistance };
      }
      canvas.setLayoutOptions(opts);
    };

    window.changeEdgeGap = () => {
      const input = document.getElementById('edge-gap');
      let edgeGap = parseInt(input.value);
      if (isNaN(edgeGap)) edgeGap = 2;
      edgeGap = Math.max(+input.min, Math.min(+input.max, edgeGap));
      input.value = edgeGap;
      canvas.setConfig({ edgeGap });
    };

    // --- Config panel apply handlers ---
    window.applyNodeStyle = () => {
      canvas.setConfig({
        nodeStyle: {
          fontFamily: document.getElementById('ns-fontFamily').value,
          fontWeightUnselected: parseInt(document.getElementById('ns-fontWeightUnselected').value),
          fontWeightSelected: parseInt(document.getElementById('ns-fontWeightSelected').value),
          fontSize: parseFloat(document.getElementById('ns-fontSize').value),
          textFillRatio: parseFloat(document.getElementById('ns-textFillRatio').value),
          strokeWidthSelected: parseFloat(document.getElementById('ns-strokeWidthSelected').value),
          strokeWidthUnselected: parseFloat(document.getElementById('ns-strokeWidthUnselected').value),
          glowDuration: parseInt(document.getElementById('ns-glowDuration').value),
          glowSpread: parseInt(document.getElementById('ns-glowSpread').value),
          glowSteps: parseInt(document.getElementById('ns-glowSteps').value),
          glowColor: hexToRgb(document.getElementById('ns-glowColor').value),
          glowMaxOpacity: parseFloat(document.getElementById('ns-glowMaxOpacity').value),
        }
      });
    };

    window.applyLinkStyle = () => {
      canvas.setConfig({
        linkStyle: {
          fontFamily: document.getElementById('ls-fontFamily').value,
          fontSize: parseFloat(document.getElementById('ls-fontSize').value),
          fontWeightUnselected: parseInt(document.getElementById('ls-fontWeightUnselected').value),
          fontWeightSelected: parseInt(document.getElementById('ls-fontWeightSelected').value),
          lineWidthSelected: parseFloat(document.getElementById('ls-lineWidthSelected').value),
          lineWidthUnselected: parseFloat(document.getElementById('ls-lineWidthUnselected').value),
          arrowLengthSelected: parseFloat(document.getElementById('ls-arrowLengthSelected').value),
          arrowLengthUnselected: parseFloat(document.getElementById('ls-arrowLengthUnselected').value),
          arrowWidthRatio: parseFloat(document.getElementById('ls-arrowWidthRatio').value),
          arrowNotchRatio: parseFloat(document.getElementById('ls-arrowNotchRatio').value),
          selfLoopCurveFactor: parseFloat(document.getElementById('ls-selfLoopCurveFactor').value),
          parallelEdgeCurveMultiplier: parseFloat(document.getElementById('ls-parallelEdgeCurveMultiplier').value),
          labelBackgroundPadding: parseFloat(document.getElementById('ls-labelBackgroundPadding').value),
        }
      });
    };

    window.applySimulation = () => {
      canvas.setConfig({
        simulation: {
          centerStrength: parseFloat(document.getElementById('sim-centerStrength').value),
          chargeStrength: parseFloat(document.getElementById('sim-chargeStrength').value),
          velocityDecay: parseFloat(document.getElementById('sim-velocityDecay').value),
          alphaMin: parseFloat(document.getElementById('sim-alphaMin').value),
          warmupTicks: parseInt(document.getElementById('sim-warmupTicks').value),
        }
      });
    };

    window.applyInteraction = () => {
      canvas.setConfig({
        interaction: {
          tooltipFontSize: parseInt(document.getElementById('int-tooltipFontSize').value),
          tooltipPadding: document.getElementById('int-tooltipPadding').value,
          tooltipBorderRadius: document.getElementById('int-tooltipBorderRadius').value,
          tooltipZIndex: parseInt(document.getElementById('int-tooltipZIndex').value),
          zoomToFitPadding: parseFloat(document.getElementById('int-zoomToFitPadding').value),
          zoomToFitDelay: parseInt(document.getElementById('int-zoomToFitDelay').value),
          linkHitWidth: parseInt(document.getElementById('int-linkHitWidth').value),
          contrastThreshold: parseFloat(document.getElementById('int-contrastThreshold').value),
        }
      });
    };

    window.applyLargeGraph = () => {
      const enabled = document.getElementById('lg-enabled').checked;
      canvas.setConfig({
        largeGraph: {
          enabled,
          viewportPadding: parseInt(document.getElementById('lg-viewportPadding').value),
          lowZoomThreshold: parseFloat(document.getElementById('lg-lowZoomThreshold').value),
          skipLabelsAtLowZoom: document.getElementById('lg-skipLabelsAtLowZoom').checked,
          skipArrowsAtLowZoom: document.getElementById('lg-skipArrowsAtLowZoom').checked,
          skipLinkLabelsAtLowZoom: document.getElementById('lg-skipLinkLabelsAtLowZoom').checked,
        }
      });
      // Start/stop debug display
      if (enabled && !lgDebugInterval) {
        lgDebugInterval = setInterval(window.updateLgDebug, 200);
        window.updateLgDebug();
      } else if (!enabled && lgDebugInterval) {
        clearInterval(lgDebugInterval);
        lgDebugInterval = null;
        document.getElementById('lg-debug').style.display = 'none';
      }
    };

    window.applyColors = () => {
      const bg = document.getElementById('cfg-backgroundColor').value;
      const fg = document.getElementById('cfg-foregroundColor').value;
      canvas.setConfig({
        backgroundColor: bg,
        foregroundColor: fg,
        showPropertyKeyPrefix: document.getElementById('cfg-showPropertyKeyPrefix').checked,
      });
    };

    // --- Action buttons ---
    let nodeCounter = 0;
    window.addNode = () => {
      const currentData = canvas.getData();
      const id = `node-${++nodeCounter}`;
      const labels = ['Person', 'Movie', 'Genre'][Math.floor(Math.random() * 3)];
      currentData.nodes.push({
        id,
        labels: [labels],
        data: { name: `${labels} ${nodeCounter}` },
        visible: true,
        color: getColorForLabel(labels)
      });
      canvas.setData(currentData);
    };

    window.addLink = () => {
      const currentData = canvas.getData();
      if (currentData.nodes.length < 2) {
        alert('Need at least 2 nodes to add a link');
        return;
      }
      const src = currentData.nodes[Math.floor(Math.random() * currentData.nodes.length)];
      let tgt = src;
      while (tgt === src) {
        tgt = currentData.nodes[Math.floor(Math.random() * currentData.nodes.length)];
      }
      const relType = ['ACTED_IN', 'DIRECTED', 'KNOWS'][Math.floor(Math.random() * 3)];
      currentData.links.push({
        id: `link-${Date.now()}`,
        source: src.id,
        target: tgt.id,
        relationship: relType,
        data: {},
        color: getColorForRelationship(relType),
        visible: true
      });
      canvas.setData(currentData);
    };

    window.generateLargeGraph = () => {
      const labels = ['Person', 'Movie', 'Genre', 'Company', 'Country'];
      const relTypes = ['ACTED_IN', 'DIRECTED', 'KNOWS', 'WORKS_AT', 'BORN_IN'];
      const nodes = [];
      const links = [];
      for (let i = 1; i <= 100; i++) {
        const label = labels[Math.floor(Math.random() * labels.length)];
        nodes.push({
          id: `lg-${i}`,
          labels: [label],
          data: { name: `${label} ${i}` },
          visible: true,
          color: getColorForLabel(label)
        });
      }
      // Create ~150 random links
      for (let i = 0; i < 150; i++) {
        const srcIdx = Math.floor(Math.random() * 100);
        let tgtIdx = srcIdx;
        while (tgtIdx === srcIdx) tgtIdx = Math.floor(Math.random() * 100);
        const rel = relTypes[Math.floor(Math.random() * relTypes.length)];
        links.push({
          id: `lg-link-${i}`,
          source: nodes[srcIdx].id,
          target: nodes[tgtIdx].id,
          relationship: rel,
          data: {},
          color: getColorForRelationship(rel),
          visible: true
        });
      }
      canvas.setData({ nodes, links });
    };

    // --- Large Graph Debug ---
    let lgDebugInterval = null;
    window.updateLgDebug = () => {
      const debugEl = document.getElementById('lg-debug');
      const enabled = document.getElementById('lg-enabled').checked;
      if (!enabled) {
        debugEl.style.display = 'none';
        return;
      }
      debugEl.style.display = 'block';
      const stats = canvas.getCullingStats();
      const threshold = parseFloat(document.getElementById('lg-lowZoomThreshold').value) || 2;
      const skipThreshold = 1 / threshold;
      const atLowZoom = stats.zoom <= skipThreshold;
      document.getElementById('lg-debug-zoom').textContent = stats.zoom.toFixed(3);
      document.getElementById('lg-debug-culling-zoom').textContent = stats.zoom.toFixed(3);
      document.getElementById('lg-debug-low-zoom').textContent = atLowZoom ? 'YES' : 'no';
      document.getElementById('lg-debug-threshold').textContent = skipThreshold.toFixed(3);
      document.getElementById('lg-debug-nodes').textContent = `${stats.visibleNodes}/${stats.totalNodes}`;
      document.getElementById('lg-debug-links').textContent = `${stats.visibleLinks}/${stats.totalLinks}`;
    };

    // --- Send Query ---
    window.sendQuery = async () => {
      const apiKey = document.getElementById('api-key').value.trim();
      const domain = document.getElementById('domain-input').value.trim() || 'https://browser.falkordb.com';
      const graphName = document.getElementById('graph-name').value.trim();
      const query = document.getElementById('query-input').value.trim();

      if (!graphName || !query) {
        alert('Please provide both a graph name and a query.');
        return;
      }

      saveToStorage();

      document.getElementById('selected-info').textContent = 'Sending query...';

      const graphData = { nodes: [], links: [] };

      const base = domain.replace(/\/+$/, '');
      const url = `${base}/api/graph/${encodeURIComponent(graphName)}?query=${encodeURIComponent(query)}`;

      try {
        const headers = {};
        if (apiKey) {
          headers['Authorization'] = `Bearer ${apiKey}`;
        }

        const response = await fetch(url, { method: 'GET', headers });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });

          const events = buffer.split('\n\n');
          buffer = events.pop();

          for (const event of events) {
            if (!event.trim()) continue;

            const lines = event.split('\n');
            let eventType = '';
            let data = '';

            for (const line of lines) {
              if (line.startsWith('event:')) {
                eventType = line.substring(6).trim();
              } else if (line.startsWith('data:')) {
                data += line.substring(5);
              }
            }

            if (eventType === 'result' && data) {
              const result = JSON.parse(data);
              console.log('Query result:', result);

              if (result.data && Array.isArray(result.data)) {
                result.data.forEach(row => {
                  // Process nodes (any key that looks like a node)
                  for (const [key, val] of Object.entries(row)) {
                    if (val && val.labels && val.id !== undefined) {
                      const primaryLabel = val.labels[0] || 'Unknown';
                      const node = {
                        id: val.id,
                        labels: val.labels,
                        data: val.properties || {},
                        visible: true,
                        color: getColorForLabel(primaryLabel)
                      };
                      if (!graphData.nodes.find(n => n.id === node.id)) {
                        graphData.nodes.push(node);
                      }
                    }
                    // Process edges
                    if (val && val.relationshipType && val.sourceId !== undefined) {
                      const relType = val.relationshipType || 'RELATED';
                      const link = {
                        id: val.id,
                        source: val.sourceId,
                        target: val.destinationId,
                        relationship: relType,
                        data: val.properties || {},
                        color: getColorForRelationship(relType),
                        visible: true
                      };
                      if (!graphData.links.find(l => l.id === link.id)) {
                        graphData.links.push(link);
                      }
                    }
                  }
                });
              }
            } else if (eventType === 'error' && data) {
              const { message } = JSON.parse(data);
              throw new Error(message);
            }
          }
        }

        canvas.setData(graphData);
        document.getElementById('selected-info').textContent =
          `Loaded ${graphData.nodes.length} nodes and ${graphData.links.length} links`;

      } catch (error) {
        document.getElementById('selected-info').textContent = `Error: ${error.message}`;
        console.error('Query error:', error);
      }
    };

    // Initialize canvas
    canvas = document.getElementById('graph');
    await customElements.whenDefined('falkordb-canvas');

    const graphContainer = document.querySelector('.graph-container');
    canvas.setWidth(graphContainer.clientWidth);
    canvas.setHeight(graphContainer.clientHeight);

    canvas.setConfig({
      eventHandlers: {
        onNodeClick: (node, event) => {
          document.getElementById('selected-info').textContent =
            `Node: ${node.data.name || node.id} (${node.labels.join(', ')})`;
        },
        onLinkClick: (link, event) => {
          document.getElementById('selected-info').textContent =
            `Link: ${link.relationship}`;
        },
        onBackgroundClick: () => {
          document.getElementById('selected-info').textContent =
            'Click on a node or link to see details';
        },
        onNodeHover: (node) => {
          document.body.style.cursor = node ? 'pointer' : 'default';
        },
        onLinkHover: (link) => {
          document.body.style.cursor = link ? 'pointer' : 'default';
        },
        onPinChange: (pinned) => {
          document.getElementById('pin-toggle').checked = pinned;
          document.getElementById('animation-toggle').disabled = document.getElementById('layout-select').value !== "force" || pinned;
        },
        onLayoutChange: (layout) => {
          currentLayout = layout;
          document.getElementById('layout-select').value = layout;
          updateDirectionOptions(layout);
        },
        onZoom: (transform) => {
          const info = document.getElementById('selected-info');
          if (!info.textContent.startsWith('Node:') && !info.textContent.startsWith('Link:')) {
            info.textContent = `Zoom: ${transform.k.toFixed(2)}x`;
          }
          if (lgDebugInterval) window.updateLgDebug();
        },
        onEngineStop: () => {
          console.log('Force simulation stopped');
        },
      },
    });

    // Allow pressing Enter in the query input to send
    document.getElementById('query-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') window.sendQuery();
    });

    // Load saved values from localStorage
    loadFromStorage();

    // Initialize direction dropdown for default layout (force = disabled)
    updateDirectionOptions(document.getElementById('layout-select').value);

    // Load default sample data so the canvas isn't empty
    const sampleData = {
      nodes: [
        { id: 1, labels: ['Movie'], data: { name: 'The Matrix', year: 1999 }, visible: true, color: getColorForLabel('Movie') },
        { id: 2, labels: ['Movie'], data: { name: 'John Wick', year: 2014 }, visible: true, color: getColorForLabel('Movie') },
        { id: 3, labels: ['Movie'], data: { name: 'Speed', year: 1994 }, visible: true, color: getColorForLabel('Movie') },
        { id: 4, labels: ['Person'], data: { name: 'Keanu Reeves', born: 1964 }, visible: true, color: getColorForLabel('Person') },
        { id: 5, labels: ['Person'], data: { name: 'Lana Wachowski', born: 1965 }, visible: true, color: getColorForLabel('Person') },
        { id: 6, labels: ['Person'], data: { name: 'Chad Stahelski', born: 1968 }, visible: true, color: getColorForLabel('Person') },
        { id: 7, labels: ['Person'], data: { name: 'Carrie-Anne Moss', born: 1967 }, visible: true, color: getColorForLabel('Person') },
        { id: 8, labels: ['Person'], data: { name: 'Sandra Bullock', born: 1964 }, visible: true, color: getColorForLabel('Person') },
        { id: 9, labels: ['Genre'], data: { name: 'Action' }, visible: true, color: getColorForLabel('Genre') },
        { id: 10, labels: ['Genre'], data: { name: 'Sci-Fi' }, visible: true, color: getColorForLabel('Genre') },
      ],
      links: [
        { id: 'e1', source: 4, target: 1, relationship: 'ACTED_IN', data: { role: 'Neo' }, color: getColorForRelationship('ACTED_IN'), visible: true },
        { id: 'e2', source: 4, target: 2, relationship: 'ACTED_IN', data: { role: 'John Wick' }, color: getColorForRelationship('ACTED_IN'), visible: true },
        { id: 'e3', source: 4, target: 3, relationship: 'ACTED_IN', data: { role: 'Jack Traven' }, color: getColorForRelationship('ACTED_IN'), visible: true },
        { id: 'e4', source: 7, target: 1, relationship: 'ACTED_IN', data: { role: 'Trinity' }, color: getColorForRelationship('ACTED_IN'), visible: true },
        { id: 'e5', source: 8, target: 3, relationship: 'ACTED_IN', data: { role: 'Annie Porter' }, color: getColorForRelationship('ACTED_IN'), visible: true },
        { id: 'e6', source: 5, target: 1, relationship: 'DIRECTED', data: {}, color: getColorForRelationship('DIRECTED'), visible: true },
        { id: 'e7', source: 6, target: 2, relationship: 'DIRECTED', data: {}, color: getColorForRelationship('DIRECTED'), visible: true },
        { id: 'e8', source: 1, target: 9, relationship: 'IN_GENRE', data: {}, color: getColorForRelationship('IN_GENRE'), visible: true },
        { id: 'e9', source: 1, target: 10, relationship: 'IN_GENRE', data: {}, color: getColorForRelationship('IN_GENRE'), visible: true },
        { id: 'e10', source: 2, target: 9, relationship: 'IN_GENRE', data: {}, color: getColorForRelationship('IN_GENRE'), visible: true },
        { id: 'e11', source: 3, target: 9, relationship: 'IN_GENRE', data: {}, color: getColorForRelationship('IN_GENRE'), visible: true },
      ]
    };
    canvas.setData(sampleData);
  </script>
